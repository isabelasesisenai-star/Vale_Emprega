<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale Emprega - Registrar Empresa</title>
    <link rel="stylesheet" href="cadastroempresa.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="Logo Vale Emprega">
            </div>
            <ul class="menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="vagas.html">Vagas</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            <div class="botoesnavbar">
                <a href="logincandidato.html" class="btn btnbranco">Sou candidato</a>
                <a href="loginempresa.html" class="btn btnlaranja ativo">Sou empresa</a>
            </div>
        </div>
    </nav>

    <!-- Seção Cadastro Empresa -->
    <section class="secaocadastroempresa">
        <div class="formulariocadastroempresa">
            <div class="cabecalhoform">
                <i class="fas fa-building"></i>
                <h2>Registrar Empresa</h2>
            </div>

            <div class="campo-input">
                <i class="fas fa-building"></i>
                <input type="text" placeholder="Nome da empresa">
            </div>

            <div class="campo-input">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="E-mail">
            </div>

            <div class="campo-input">
                <i class="fas fa-phone"></i>
                <input type="tel" placeholder="Telefone">
            </div>

            <div class="campo-input">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" placeholder="Cidade">
            </div>

            <div class="campo-input">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Senha">
            </div>

            <div class="campo-input">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Confirmar senha">
            </div>

            <a href="homeempresa.html" class="btn btnlaranja btn-registrar">Registrar</a>

            <!-- LINK ARRUMADO E BONITO -->
            <p class="link-login">Já tem uma conta? <a href="loginempresa.html">Entrar</a></p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="conteudofooter">
                <img src="img/logoazul.png" alt="Logo Vale Emprega" class="logofooter">
                <p>Assessoria Empresarial LTDA | CNPJ: 12.345.678/0001-99 | Av. das Oportunidades, 1234, São Paulo/SP</p>
                <a href="#" class="linkprivacidade">Política de Privacidade</a>
            </div>
        </div>
    </footer>

</body>
</html>
