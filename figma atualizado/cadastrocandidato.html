<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale Emprega - Registrar-se</title>
    <link rel="stylesheet" href="cadastrocandidato.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="Logo Vale Emprega">
            </div>
            <ul class="menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="vagas.html">Vagas</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            <div class="botoesnavbar">
                <a href="logincandidato.html" class="btn btnbranco">Sou candidato</a>
                <a href="loginempresa.html" class="btn btnlaranja">Sou empresa</a>
            </div>
        </div>
    </nav>

    <!-- Seção Cadastro -->
    <section class="secaocadastro">
        <div class="formulariocadastro">
            <div class="cabecalhoform">
                <i class="fas fa-user-plus"></i>
                <h2>Registrar</h2>
            </div>

            <div class="campo-input">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="*Nome completo">
            </div>

            <div class="campo-input">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="*Email">
            </div>

            <div class="campo-input">
                <i class="fas fa-phone"></i>
                <input type="tel" placeholder="*Telefone celular">
            </div>

            <div class="campo-input">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" placeholder="*Cidade">
            </div>

            <div class="opcoes-check">
                <p class="titulo-check">Marque esta opção para receber por email:</p>
                <label class="item-check">
                    <input type="checkbox">
                    <span>- Alertas de vagas abertas</span>
                </label>
                <label class="item-check">
                    <input type="checkbox">
                    <span>- Dicas de carreira</span>
                </label>
                <label class="item-check">
                    <input type="checkbox">
                    <span>- Mensagens semanais</span>
                </label>
                <label class="item-check termo">
                    <input type="checkbox">
                    <span>* Li e concordo com a Política de privacidade</span>
                </label>
            </div>

            <!-- LINK PARA HOME CANDIDATO -->
            <a href="homecandidato.html" class="btn btnlaranja btn-registrar">Registrar-se</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="conteudofooter">
                <img src="img/logoazul.png" alt="Logo Vale Emprega" class="logofooter">
                <p>Assessoria Empresarial LTDA | CNPJ: 12.345.678/0001-99 | Av. das Oportunidades, 1234, São Paulo/SP</p>
                <a href="#" class="linkprivacidade">Política de Privacidade</a>
            </div>
        </div>
    </footer>

</body>
</html>
