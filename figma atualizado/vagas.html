<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Vale Emprega - Vagas</title>
    <link rel="stylesheet" href="vagas.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="Logo Vale Emprega">
            </div>
            <ul class="menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="vagas.html" class="ativo">Vagas</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            <div class="botoesnavbar">
                <a href="logincandidato.html" class="btn btnbranco">Sou candidato</a>

        </div>

    <section class="secaovagas">

            <h2>As melhores empresas contratam aqui!</h2>

            <div class="logosempresas">
                <div class="logoempresa shibata">
                    <img src="img/shibata.png" alt="Shibata">
                </div>
                <div class="logoempresa nestle">
                    <img src="img/nestle.png" alt="Nestlé">
                </div>
                <div class="logoempresa magalu">
                    <img src="img/magalu.jpg" alt="Magalu">
                </div>
            </div>

            <a href="#" class="btn btnlaranja btnverempresas">Confira todas as empresas contratando</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="conteudofooter">
                <img src="img/logoazul.png" alt="Logo Vale Emprega" class="logofooter">
                <p>Assessoria Empresarial LTDA | CNPJ: 12.345.678/0001-99 | Av. das Oportunidades, 1234, São Paulo/SP</p>
                <a href="#" class="linkprivacidade">Política de Privacidade</a>
